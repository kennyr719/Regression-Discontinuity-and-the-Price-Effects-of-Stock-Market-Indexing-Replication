name: Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: russell-rd
          auto-activate-base: false

      - name: Lint with Ruff
        shell: bash -l {0}
        run: ruff check auxiliary/ tests/

      - name: Run tests
        shell: bash -l {0}
        run: pytest tests/ -v
